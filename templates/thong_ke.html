{% extends 'base.html' %}

{% block title %}Thống kê doanh thu{% endblock %}

{% block extra_css %}
<style>
  .main-content{padding:20px}
  #myChart{background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px #ccc}
</style>
{% endblock %}

{% block content %}
<div class="container main-content">
    <h2 class="mb-3">Báo cáo doanh thu</h2>
    <div class="tk-controls" style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <label>From <input type="date" id="startDate"></label>
        <label>To <input type="date" id="endDate"></label>
        <button id="loadBtn" class="btn btn-sm btn-primary">Tải</button>
        <button id="exportCsv" class="btn btn-sm btn-outline-secondary">Xuất CSV</button>
        <label style="margin-left:auto">Mốc (đ) <input type="number" id="benchmarkInput" placeholder="530000" style="width:120px;padding:6px;border:1px solid #ddd;border-radius:4px"></label>
        <button id="saveBenchmark" class="btn btn-sm btn-info" style="background:#3b82f6;color:white">Lưu mốc</button>
    </div>
    
    <canvas id="myChart"></canvas>
    <div style="margin-top:18px;background:#fff;padding:12px;border-radius:8px">
        <table class="table" id="tkTable"><thead><tr><th>Ngày</th><th>Doanh thu</th></tr></thead><tbody></tbody></table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function(){
        let chart;
        const fmt = new Intl.NumberFormat('vi-VN');
        let BENCHMARK = localStorage.getItem('benchmark') ? parseInt(localStorage.getItem('benchmark')) : 530000;
        
        function formatCurrency(n){ return fmt.format(n) + ' đ'; }
        
        // Hiển thị mốc hiện tại ở input
        document.getElementById('benchmarkInput').value = BENCHMARK;
        
        // Lưu mốc mới
        document.getElementById('saveBenchmark').addEventListener('click', function(){
            var newBenchmark = parseInt(document.getElementById('benchmarkInput').value);
            if(!isNaN(newBenchmark) && newBenchmark > 0){
                BENCHMARK = newBenchmark;
                localStorage.setItem('benchmark', BENCHMARK);
                alert('Đã lưu mốc: ' + fmt.format(BENCHMARK) + ' đ');
                loadData(); // Tải lại dữ liệu để cập nhật tooltip
            } else {
                alert('Vui lòng nhập số hợp lệ');
            }
        });
        
        function renderChart(labels, values){   //
            var ctx = document.getElementById('myChart');
            if(chart) chart.destroy();
            var total = values.reduce((a,b) => a+b, 0);
            var percentages = values.map(v => total > 0 ? ((v/total)*100).toFixed(1) : 0);  // Tính phần trăm so với tổng
            var benchmarkPercents = values.map(v => BENCHMARK > 0 ? ((v/BENCHMARK)*100).toFixed(1) : 0);
            chart = new Chart(ctx, {
                type:'bar',
                data:{ labels: labels, datasets:[{ label:'Doanh thu (VNĐ)', data: values, backgroundColor:'#28a745' }] },
                options:{ 
                    responsive:true, 
                    plugins:{ 
                        tooltip:{ 
                            callbacks:{ 
                                label: function(ctx){ 
                                    var idx = ctx.dataIndex;
                                    var pct = percentages[idx] || 0;
                                    var benchPct = benchmarkPercents[idx] || 0;
                                    return formatCurrency(ctx.parsed.y) + ' (Mốc: ' + benchPct + '%)'; //
                                } 
                            } 
                        } 
                    } 
                }
            });
        }

        function loadData(){
            var s = document.getElementById('startDate').value; var e = document.getElementById('endDate').value;
            var url = '/api/thong-ke' + (s && e? ('?start='+s+'&end='+e) : '');
            fetch(url).then(function(r){ if(!r.ok) throw new Error('Network error'); return r.json(); }).then(function(data){
                renderChart(data.labels, data.values);
                var tbody = document.querySelector('#tkTable tbody'); tbody.innerHTML=''; var total=0; var maxVal=0;
                data.rows.forEach(function(r){ total += Number(r.total||0); maxVal = Math.max(maxVal, Number(r.total||0)); });
                data.rows.forEach(function(r){ 
                    var val = Number(r.total||0);
                    var tr = document.createElement('tr'); 
                    tr.innerHTML = '<td>'+ r.date +'</td><td>'+ formatCurrency(val) +'</td>'; 
                    tbody.appendChild(tr); 
                });
            }).catch(function(err){ console.error(err); alert('Lỗi tải dữ liệu thống kê'); });
        }

        document.getElementById('loadBtn').addEventListener('click', loadData);
        document.getElementById('exportCsv').addEventListener('click', function(){
            var rows = [['Date','Total']]; document.querySelectorAll('#tkTable tbody tr').forEach(function(tr){ rows.push([tr.children[0].innerText, tr.children[1].innerText.replace(/[\.\sđ]/g,'')]); });
            var csv = rows.map(r=>r.join(',')).join('\n'); var blob = new Blob([csv], {type:'text/csv'}); var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='thong_ke.csv'; a.click();
        });

        // initial load: last 7 days
        (function(){ var d=new Date(); var e=d.toISOString().slice(0,10); d.setDate(d.getDate()-6); var s=d.toISOString().slice(0,10); document.getElementById('startDate').value=s; document.getElementById('endDate').value=e; loadData(); })();
    });
    </script>
</div>
{% endblock %}
